<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Git Flow Skill hero banner">
  <defs>
    <linearGradient id="paper-wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF9ED" />
      <stop offset="100%" stop-color="#FCF3D8" />
    </linearGradient>
    <linearGradient id="copper-bleed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F2800" />
      <stop offset="100%" stop-color="#6F3B00" />
    </linearGradient>
    <linearGradient id="green-wash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E4EAD7" />
      <stop offset="100%" stop-color="#D6E2CE" />
    </linearGradient>
    <pattern id="ledger-line" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M0 43.5 H44" fill="none" stroke="#4F2800" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#paper-wash)" />
  <rect y="0" width="1600" height="108" fill="#FCF3D8" />
  <rect x="1180" y="0" width="420" height="900" fill="#F7EED2" />
  <rect x="0" y="0" width="1600" height="900" fill="url(#ledger-line)" opacity="0.35" />

  <text x="86" y="68" font-family="'Newsreader', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="28" font-style="italic" fill="#4F2800">Git-Flow Skill</text>
  <text x="1064" y="68" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" letter-spacing="2" fill="#42474D">ARCHIVE</text>
  <text x="1156" y="68" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" letter-spacing="2" fill="#406180">BRANCHES</text>
  <text x="1276" y="68" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" letter-spacing="2" fill="#42474D">STRATEGY</text>
  <rect x="1394" y="34" width="118" height="38" fill="url(#copper-bleed)" />
  <text x="1421" y="58" font-family="'Newsreader', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="18" font-style="italic" fill="#FFFFFF">Open Ledger</text>

  <g transform="translate(86 160)">
    <text x="0" y="0" font-family="'Newsreader', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="106" font-style="italic" fill="#406180">Git Flow Skill</text>
    <text x="0" y="70" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#42474D">A Codex skill for detection-first Git Flow</text>
    <text x="0" y="112" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#42474D">branching, releases, hotfixes, and</text>
    <text x="0" y="154" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" fill="#42474D">documented agent work.</text>

    <g transform="translate(0 202)">
      <rect width="184" height="54" fill="url(#copper-bleed)" />
      <text x="27" y="35" font-family="'Newsreader', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="26" font-style="italic" fill="#FFFFFF">Initialize</text>
      <rect x="204" width="184" height="54" fill="#FFF9ED" stroke="#C2C7CE" stroke-opacity="0.18" />
      <text x="250" y="35" font-family="'Newsreader', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="26" font-style="italic" fill="#406180">Read Manual</text>
    </g>
  </g>

  <g transform="translate(970 146)">
    <rect width="442" height="422" fill="#EBE2C8" />
    <rect x="34" y="34" width="374" height="354" fill="url(#green-wash)" />
    <rect x="34" y="34" width="374" height="354" fill="#FFFFFF" fill-opacity="0.18" />

    <path d="M150 88 V304" fill="none" stroke="#4F2800" stroke-width="1.5" stroke-opacity="0.2" />
    <path d="M150 145 C 210 145, 248 126, 328 118" fill="none" stroke="#406180" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" />
    <path d="M150 208 C 226 208, 252 188, 332 180" fill="none" stroke="#6F3B00" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" />
    <path d="M150 270 C 224 270, 248 252, 336 244" fill="none" stroke="#263800" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" />

    <rect x="146" y="141" width="8" height="8" fill="#406180" />
    <rect x="146" y="204" width="8" height="8" fill="#406180" />
    <rect x="146" y="266" width="8" height="8" fill="#406180" />
    <rect x="325" y="114" width="8" height="8" fill="#406180" />
    <rect x="329" y="176" width="8" height="8" fill="#8C4F10" />
    <rect x="333" y="240" width="8" height="8" fill="#263800" />

    <rect x="298" y="368" width="164" height="46" fill="#263800" />
    <text x="316" y="397" font-family="'Newsreader', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="21" font-style="italic" fill="#FFFFFF">Certified Pattern</text>
  </g>

  <g transform="translate(362 535)">
    <rect width="788" height="168" fill="url(#green-wash)" />
    <rect width="788" height="168" fill="#FFFFFF" fill-opacity="0.14" />
    <rect x="36" y="28" width="150" height="16" fill="#406180" fill-opacity="0.14" />
    <text x="38" y="73" font-family="'Newsreader', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="40" font-style="italic" fill="#406180">The Detection-First Doctrine</text>
    <text x="38" y="114" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#42474D">Inspect the real branch model before touching feature, release, or hotfix paths.</text>
    <text x="38" y="145" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#42474D">Document each move like an archival ledger, not a disposable dashboard.</text>
  </g>

  <text x="264" y="796" font-family="'Newsreader', 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Georgia, serif" font-size="24" font-style="italic" letter-spacing="8" fill="#73777E">TECHNICAL SPECIFICATIONS</text>

  <g transform="translate(92 822)">
    <rect width="312" height="42" fill="#1F1C0B" />
    <text x="24" y="28" font-family="'Cascadia Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', monospace" font-size="16" fill="#C8F17A">codex skill install git-flow-skill</text>
  </g>
  <g transform="translate(1104 816)">
    <rect width="332" height="48" fill="#FCF3D8" />
    <text x="22" y="30" font-family="'Cascadia Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', monospace" font-size="16" fill="#4F2800">uv run --with pyyaml validate</text>
    <rect x="266" y="12" width="44" height="24" fill="#FFFFFF" />
    <text x="274" y="29" font-family="'Work Sans', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="700" fill="#263800">PASS</text>
  </g>
</svg>